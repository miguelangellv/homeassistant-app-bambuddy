# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-config
name: Bambuddy
version: "0.2.3.2"
slug: bambuddy
stage: stable
description: Bambuddy is a powerful, self-hosted print archive and management system for Bambu Lab 3D printers.
url: "https://github.com/Spegeli/homeassistant-app-bambuddy"
arch:
  - aarch64
  - amd64
init: false
host_network: true
hassio_role: homeassistant
privileged:
  - NET_RAW
  - NET_BIND_SERVICE
homeassistant_api: true
options:
  debug: false
schema:
  debug: bool
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: "HTTP Web Interface"
webui: http://[HOST]:[PORT:8000]
watchdog: http://[HOST]:[PORT:8000]/health
