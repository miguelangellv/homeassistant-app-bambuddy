name: Auto-Update BamBuddy Version - STABLE

on:
  schedule:
    - cron: '0 * * * *'  # stündlich
  workflow_dispatch:

concurrency:
  group: update-stable
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Get latest stable version from GitHub Releases
        id: get_version
        run: |
          RELEASE_JSON=$(curl -s "https://api.github.com/repos/maziggy/bambuddy/releases" \
            | jq '[.[] | select(.prerelease == false) | select(.tag_name | ltrimstr("v") | test("^[0-9]+\\.[0-9]+(\\.[0-9]+)*$"))] | sort_by(.published_at) | reverse | first')
          LATEST=$(echo "$RELEASE_JSON" | jq -r '.tag_name' | sed 's/^v//')
          BODY=$(echo "$RELEASE_JSON" | jq -r '.body')
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Gefundene Version: $LATEST"

      - name: Get current version from Dockerfile
        id: get_current
        run: |
          CURRENT=$(grep '^ARG BAMBUDDY_VERSION=' bambuddy/Dockerfile | sed 's/ARG BAMBUDDY_VERSION=//')
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "Aktuelle Version: $CURRENT"

      - name: Update Dockerfile und config.yaml
        if: steps.get_version.outputs.latest != '' && steps.get_version.outputs.latest != steps.get_current.outputs.current
        run: |
          sed -i 's/^ARG BAMBUDDY_VERSION=.*/ARG BAMBUDDY_VERSION=${{ steps.get_version.outputs.latest }}/' bambuddy/Dockerfile
          sed -i 's/^version: ".*"/version: "${{ steps.get_version.outputs.latest }}"/' bambuddy/config.yaml
          echo "Beide Dateien aktualisiert auf ${{ steps.get_version.outputs.latest }}"

      - name: Update CHANGELOG.md
        if: steps.get_version.outputs.latest != '' && steps.get_version.outputs.latest != steps.get_current.outputs.current
        run: |
          python3 - <<'PYEOF'
          import os

          version = os.environ.get("NEW_VERSION", "")
          body = os.environ.get("NEW_BODY", "")

          new_entry = f"## {version}\n\n{body}\n\n"

          existing = ""
          if os.path.exists("bambuddy/CHANGELOG.md"):
              with open("bambuddy/CHANGELOG.md", "r") as f:
                  existing = f.read()

          with open("bambuddy/CHANGELOG.md", "w") as f:
              f.write(new_entry)

          print("CHANGELOG.md aktualisiert")
          PYEOF
        env:
          NEW_VERSION: ${{ steps.get_version.outputs.latest }}
          NEW_BODY: ${{ steps.get_version.outputs.body }}

      - name: Commit and push
        if: steps.get_version.outputs.latest != '' && steps.get_version.outputs.latest != steps.get_current.outputs.current
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bambuddy/Dockerfile bambuddy/config.yaml bambuddy/CHANGELOG.md
          git commit -m "chore: update BamBuddy ${{ steps.get_current.outputs.current }} → ${{ steps.get_version.outputs.latest }}"
          git push
