name: Auto-Update BamBuddy Versions

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ============================================================
  # STABLE
  # ============================================================
  update-stable:
    name: Update STABLE
    runs-on: ubuntu-latest
    concurrency:
      group: update-stable
      cancel-in-progress: true
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Get latest stable version from GitHub Releases
        id: get_version
        run: |
          RELEASE_JSON=$(curl -s "https://api.github.com/repos/maziggy/bambuddy/releases" \
            | jq '[.[] | select(.prerelease == false) | select(.tag_name | ltrimstr("v") | test("^[0-9]+\\.[0-9]+(\\.[0-9]+)*$"))] | sort_by(.published_at) | reverse | first')
          LATEST=$(echo "$RELEASE_JSON" | jq -r '.tag_name' | sed 's/^v//')
          BODY=$(echo "$RELEASE_JSON" | jq -r '.body')
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Found version: $LATEST"

      - name: Get current version from Dockerfile
        id: get_current
        run: |
          CURRENT=$(grep '^ARG BAMBUDDY_VERSION=' bambuddy/Dockerfile | sed 's/ARG BAMBUDDY_VERSION=//')
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT"

      - name: Update Dockerfile and config.yaml
        if: steps.get_version.outputs.latest != '' && steps.get_version.outputs.latest != steps.get_current.outputs.current
        run: |
          sed -i 's/^ARG BAMBUDDY_VERSION=.*/ARG BAMBUDDY_VERSION=${{ steps.get_version.outputs.latest }}/' bambuddy/Dockerfile
          sed -i 's/^version: ".*"/version: "${{ steps.get_version.outputs.latest }}"/' bambuddy/config.yaml

      - name: Update CHANGELOG.md
        if: steps.get_version.outputs.latest != '' && steps.get_version.outputs.latest != steps.get_current.outputs.current
        run: |
          python3 - <<'PYEOF'
          import os
          version = os.environ.get("NEW_VERSION", "")
          body = os.environ.get("NEW_BODY", "")
          with open("bambuddy/CHANGELOG.md", "w") as f:
              f.write(f"## {version}\n\n{body}\n\n")
          print("CHANGELOG.md updated")
          PYEOF
        env:
          NEW_VERSION: ${{ steps.get_version.outputs.latest }}
          NEW_BODY: ${{ steps.get_version.outputs.body }}

      - name: Commit and push
        if: steps.get_version.outputs.latest != '' && steps.get_version.outputs.latest != steps.get_current.outputs.current
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bambuddy/Dockerfile bambuddy/config.yaml bambuddy/CHANGELOG.md
          git commit -m "chore: update BamBuddy ${{ steps.get_current.outputs.current }} -> ${{ steps.get_version.outputs.latest }}"
          git push

  # ============================================================
  # BETA
  # ============================================================
  update-beta:
    name: Update BETA
    runs-on: ubuntu-latest
    concurrency:
      group: update-beta
      cancel-in-progress: true
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Get latest beta version from GitHub Releases
        id: get_version
        run: |
          RELEASE_JSON=$(curl -s "https://api.github.com/repos/maziggy/bambuddy/releases" \
            | jq '[.[] | select(.prerelease == false) | select(.tag_name | ltrimstr("v") | test("^[0-9]+\\.[0-9]+(\\.[0-9]+)*b[0-9]+$"))] | sort_by(.published_at) | reverse | first')
          LATEST=$(echo "$RELEASE_JSON" | jq -r '.tag_name' | sed 's/^v//')
          BODY=$(echo "$RELEASE_JSON" | jq -r '.body')
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Found version: $LATEST"

      - name: Get current version from Dockerfile
        id: get_current
        run: |
          CURRENT=$(grep '^ARG BAMBUDDY_VERSION=' bambuddy-beta/Dockerfile | sed 's/ARG BAMBUDDY_VERSION=//')
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT"

      - name: Update Dockerfile and config.yaml
        if: steps.get_version.outputs.latest != '' && steps.get_version.outputs.latest != steps.get_current.outputs.current
        run: |
          sed -i 's/^ARG BAMBUDDY_VERSION=.*/ARG BAMBUDDY_VERSION=${{ steps.get_version.outputs.latest }}/' bambuddy-beta/Dockerfile
          sed -i 's/^version: ".*"/version: "${{ steps.get_version.outputs.latest }}"/' bambuddy-beta/config.yaml

      - name: Update CHANGELOG.md
        if: steps.get_version.outputs.latest != '' && steps.get_version.outputs.latest != steps.get_current.outputs.current
        run: |
          python3 - <<'PYEOF'
          import os
          version = os.environ.get("NEW_VERSION", "")
          body = os.environ.get("NEW_BODY", "")
          with open("bambuddy-beta/CHANGELOG.md", "w") as f:
              f.write(f"## {version}\n\n{body}\n\n")
          print("CHANGELOG.md updated")
          PYEOF
        env:
          NEW_VERSION: ${{ steps.get_version.outputs.latest }}
          NEW_BODY: ${{ steps.get_version.outputs.body }}

      - name: Commit and push
        if: steps.get_version.outputs.latest != '' && steps.get_version.outputs.latest != steps.get_current.outputs.current
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bambuddy-beta/Dockerfile bambuddy-beta/config.yaml bambuddy-beta/CHANGELOG.md
          git commit -m "chore: update BamBuddy ${{ steps.get_current.outputs.current }} -> ${{ steps.get_version.outputs.latest }}"
          git push

  # ============================================================
  # DAILY
  # ============================================================
  update-daily:
    name: Update DAILY
    runs-on: ubuntu-latest
    concurrency:
      group: update-daily
      cancel-in-progress: true
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Get latest daily digest and version
        id: get_digest
        run: |
          TOKEN=$(curl -s "https://ghcr.io/token?scope=repository:maziggy/bambuddy:pull" \
            | jq -r '.token')

          DIGEST=$(curl -sI -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            -H "Accept: application/vnd.docker.distribution.manifest.list.v2+json" \
            "https://ghcr.io/v2/maziggy/bambuddy/manifests/daily" \
            | grep -i "docker-content-digest" | tr -d '\r' | awk '{print $2}')

          if [ -z "$DIGEST" ]; then
            echo "ERROR: Digest could not be fetched!"
            exit 1
          fi

          SHORT=$(echo "$DIGEST" | cut -c8-15)

          RELEASE_TAG=$(curl -s "https://api.github.com/repos/maziggy/bambuddy/releases?per_page=10" \
            | jq -r '[.[] | select(.prerelease == true)] | first | .tag_name' | sed 's/^v//')

          if [ -z "$RELEASE_TAG" ]; then
            DATE=$(date +%Y.%m.%d)
            RELEASE_TAG="${DATE}-${SHORT}"
          fi

          echo "short=$SHORT" >> $GITHUB_OUTPUT
          echo "version=$RELEASE_TAG" >> $GITHUB_OUTPUT
          echo "Digest SHA: $SHORT"
          echo "Version: $RELEASE_TAG"

      - name: Get daily changelog from GitHub Releases
        id: get_changelog
        run: |
          RELEASE_JSON=$(curl -s "https://api.github.com/repos/maziggy/bambuddy/releases?per_page=10" \
            | jq '[.[] | select(.prerelease == true)] | first')
          BODY=$(echo "$RELEASE_JSON" | jq -r '.body')
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get current version from config.yaml
        id: get_current
        run: |
          CURRENT=$(grep '^version:' bambuddy-daily/config.yaml | sed 's/.*"\(.*\)"/\1/')
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT"

      - name: Update config.yaml
        if: steps.get_digest.outputs.version != steps.get_current.outputs.current
        run: |
          sed -i 's/^version: ".*"/version: "${{ steps.get_digest.outputs.version }}"/' bambuddy-daily/config.yaml

      - name: Update CHANGELOG.md
        if: steps.get_digest.outputs.version != steps.get_current.outputs.current
        run: |
          python3 - <<'PYEOF'
          import os
          version = os.environ.get("NEW_VERSION", "")
          body = os.environ.get("NEW_BODY", "")
          with open("bambuddy-daily/CHANGELOG.md", "w") as f:
              f.write(f"## {version}\n\n{body}\n\n")
          print("CHANGELOG.md updated")
          PYEOF
        env:
          NEW_VERSION: ${{ steps.get_digest.outputs.version }}
          NEW_BODY: ${{ steps.get_changelog.outputs.body }}

      - name: Commit and push
        if: steps.get_digest.outputs.version != steps.get_current.outputs.current
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bambuddy-daily/config.yaml bambuddy-daily/CHANGELOG.md
          git diff --staged --quiet || git commit -m "chore: update BamBuddy Daily ${{ steps.get_current.outputs.current }} -> ${{ steps.get_digest.outputs.version }}"
          git push
