configuration:
  debug:
    name: Debug
    description: Schalter um Debug Meldungen einzuschalten
  trusted_frame_origins:
    name: Erlaubte Ursprungs-URLs
    description: "Format: http:// oder https:// gefolgt von einer IP-Adresse oder Domain, optional mit :PORT. Beispiele: http://192.168.1.1:8123 | https://192.168.1.1 | http://homeassistant.local:8123 | https://meine-domain.de - Mehr Infos: https://wiki.bambuddy.cool/getting-started/docker/#environment-variables"
  enable_share:
    name: Share-Speicher einbinden
    description: "Bindet das Home Assistant /share-Verzeichnis in BamBuddy ein. Erforderlich um Netzwerkspeicher (NAS, USB, SMB/NFS-Freigaben) der ueber HA Einstellungen -> System -> Speicher hinzugefuegt wurde als externen Ordner im BamBuddy Dateimanager zu nutzen. Lese-/Schreibzugriff - Nur-Lesen kann pro Ordner innerhalb von BamBuddy konfiguriert werden."
  enable_media:
    name: Media-Speicher einbinden
    description: "Bindet das Home Assistant /media-Verzeichnis in BamBuddy ein. Erforderlich um Medien-Netzwerkspeicher der ueber HA Einstellungen -> System -> Speicher hinzugefuegt wurde als externen Ordner im BamBuddy Dateimanager zu nutzen. Lese-/Schreibzugriff - Nur-Lesen kann pro Ordner innerhalb von BamBuddy konfiguriert werden."
  use_system_trust_store:
    name: System Trust Store verwenden
    description: "Aktivieren um ein eigenes CA-Zertifikat fuer HTTPS-Verbindungen zu nutzen (z.B. zu einer Home Assistant Instanz mit selbst-signiertem Zertifikat). Lege deine CA-Zertifikatsdatei (.crt) im addon_configs Ordner ab (Datei-Editor -> addon_configs -> [dein_addon_slug]) und trage den Dateinamen unten ein."
  certfile:
    name: CA-Zertifikat Dateiname
    description: "Dateiname des CA-Zertifikats (.crt) im addon_configs Ordner. Standard: custom_ca.crt"
