# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-config
name: Bambuddy (Daily)
version: "0.2.5b1-daily.20260524"
slug: bambuddy_daily
stage: experimental
description: Bambuddy is a powerful, self-hosted command center for Bambu Lab — from one A1 to a 40-printer farm. Your Printers. No Cloud. Your Rules.
url: "https://github.com/Spegeli/homeassistant-app-bambuddy"
arch:
  - aarch64
  - amd64
init: false
host_network: true
hassio_role: homeassistant
privileged:
  - NET_RAW
homeassistant_api: true
map:
  - addon_config:rw
options:
  trusted_frame_origins:
    - "http://homeassistant.local:8123"
  use_system_trust_store: false
  certfile: "custom_ca.crt"
  debug: false
schema:
  trusted_frame_origins:
    - str
  use_system_trust_store: bool
  certfile: str
  debug: bool
environment:
  TRUSTED_FRAME_ORIGINS: "{{trusted_frame_origins}}"
webui: http://[HOST]:[PORT:8000]
watchdog: http://[HOST]:[PORT:8000]/health
