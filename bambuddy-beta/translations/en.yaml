configuration:
  debug:
    name: Debug
    description: Flag to enable debug messages
  trusted_frame_origins:
    name: Allowed Origin URLs
    description: "Format: http:// or https:// followed by an IP address or domain, optionally with :PORT. Examples: http://192.168.1.1:8123 | https://192.168.1.1 | http://homeassistant.local:8123 | https://my-domain.com – More info: https://wiki.bambuddy.cool/getting-started/docker/#environment-variables"
  use_system_trust_store:
    name: Use System Trust Store
    description: "Enable to use a custom CA certificate for HTTPS connections (e.g. to a Home Assistant instance with a self-signed certificate). Place your CA certificate (.crt file) in the addon_configs folder (File Editor → addon_configs → [your_addon_slug]) and enter the filename in the field below."
  certfile:
    name: CA Certificate Filename
    description: "Filename of the CA certificate (.crt) placed in the addon_configs folder. Default: custom_ca.crt"
